<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        /* CSS STYLES */
        html { scroll-behavior: smooth; font-family: sans-serif; }
        body { margin: 0; padding-top: 60px; line-height: 1.6; color: #333; }
        
        /* Navigation */
        .w3-top { position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .w3-bar { background: #fff; display: flex; padding: 10px; }
        .nav-btn { padding: 8px 16px; text-decoration: none; color: #007bff; font-weight: bold; cursor: pointer; }

        /* Sections */
        section { padding: 60px 20px; border-bottom: 1px solid #eee; min-height: 300px; }
        
        /* Hidden Content Base State */
        .reveal-section { 
            display: none; opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.6s ease-out; 
            padding: 20px; background: #f9f9f9; border-left: 5px solid #007bff; margin-top: 20px;
        }
        .reveal-section.active { display: block; }
        .reveal-section.visible { opacity: 1; transform: translateY(0); }

        /* Buttons & Honeypot */
        .toggle-btn { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .toggle-btn:hover { background: #0056b3; }
        .honey-trap { display: none !important; }
    </style>
</head>
<body>

<nav class="w3-top">
    <div class="w3-bar">
        <!-- Navigation using data-target to trigger the same logic -->
        <a class="nav-btn" data-target="el1">Element 1</a>
        <a class="nav-btn" data-target="el2">Element 2</a>
        <a class="nav-btn" data-target="el3">Element 3</a>
        <a class="nav-btn" data-target="el4">Element 4</a>
    </div>
</nav>

<section id="intro">
    <h1>Welcome to our  Site</h1>
    <p>Scroll down or use the menu to reveal  content.</p>
</section>

<!-- Example Hidden Section 1 -->
<section id="el1">
    <h2>Main Section 1</h2>
    <div class="honey-trap" aria-hidden="true"><input type="text" tabindex="-1" autocomplete="off"></div>
    <button class="toggle-btn" data-target="sub-el1" data-path="Y29udGVudC9zdWItZWwzLmh0bWw=">Show content 1</button>
    <div id="sub-el1" class="reveal-section"></div>
</section>

<!-- Example Hidden Section 2 -->
<section id="el2">
    <h2>Main Section 2</h2>
    <div class="honey-trap" aria-hidden="true"><input type="text" tabindex="-1" autocomplete="off"></div>
    <button class="toggle-btn" data-target="sub-el2" data-path="Y29udGVudC9zdWItZWwzLmh0bWw=">Show content 2</button>
    <div id="sub-el2" class="reveal-section"></div>
</section>

<script>
    // JAVASCRIPT LOGIC
    const PAGE_START = Date.now();

    // 1. Core Reveal Function
    async function revealContent(btn) {
        const targetId = btn.getAttribute('data-target');
        const targetEl = document.getElementById(targetId);
        const encodedPath = btn.getAttribute('data-path');

        // Bot Checks
        const trap = btn.parentElement.querySelector('.honey-trap input');
        if (trap && trap.value !== "") return; // Honeypot fail
        if (Date.now() - PAGE_START < 1000) return; // Timing fail (1s)

        if (targetEl && encodedPath) {
            // Load content if empty
            if (targetEl.innerHTML.trim() === "") {
                try {
                    const path = atob(encodedPath);
                    const res = await fetch(path);
                    const base64Content = await res.text();
                    // Decode Unicode-safe: handle emojis/special chars
                    targetEl.innerHTML = decodeURIComponent(escape(atob(base64Content.trim())));
                } catch (e) {
                    targetEl.innerHTML = "Error loading content.";
                }
            }

            // Animate Toggle
            const isVisible = targetEl.classList.contains('visible');
            if (!isVisible) {
                targetEl.classList.add('active');
                requestAnimationFrame(() => targetEl.classList.add('visible'));
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                targetEl.classList.remove('visible');
                setTimeout(() => targetEl.classList.remove('active'), 600);
            }
        }
    }

    // 2. Click Event Listener
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-target]');
        if (btn) revealContent(btn);
    });

    // 3. Deep Linking Logic (Handling ?show=ID from other pages)
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const autoOpen = urlParams.get('show');
        if (autoOpen) {
            const btn = document.querySelector(`[data-target="${autoOpen}"]`);
            if (btn) setTimeout(() => btn.click(), 500);
            // Clean URL after opening
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });
</script>

</body>
</html>
